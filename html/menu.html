<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RondoSpace Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="menu.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">RondoSpace</div>
    </header>

    <div class="app-body">
      <aside class="sidebar">
        <button class="nav-item is-active" type="button">Menu</button>
        <button class="nav-item" type="button">Liked Songs</button>
        <button class="nav-item" type="button">Disclaimer</button>
      </aside>

      <main class="main-content">
        <section class="hero-section">
          <p class="section-kicker">Featured</p>
          <h1>Today's Song</h1>

          <article class="today-card" id="todayCard">
            <div class="today-art" id="todayArt"></div>
            <div class="today-meta">
              <h2 id="todayTitle">Loi Nguoc Dong</h2>
              <p id="todayArtist">Orange</p>
            </div>
          </article>
        </section>

        <section class="library-section">
          <div class="section-head">
            <div>
              <p class="section-kicker">Playlist</p>
              <h2>Continue Listening</h2>
            </div>
          </div>

          <div class="song-row" id="songRow"></div>
        </section>
      </main>

      <aside class="queue-panel" id="queuePanel" aria-hidden="true">
        <div class="queue-panel-head">
          <div>
            <p class="queue-kicker">Now Queue</p>
            <h2>Playing Next</h2>
          </div>
          <button class="queue-close" id="queueClose" type="button" aria-label="Close queue">x</button>
        </div>
        <div class="queue-list" id="queueList"></div>
      </aside>
    </div>

    <footer class="player-bar">
      <div class="player-left">
        <div class="player-art" id="playerArt"></div>
        <div class="player-meta">
          <strong id="playerTitle">Loi Nguoc Dong</strong>
          <span id="playerArtist">Orange</span>
        </div>
      </div>

      <div class="player-center">
        <div class="player-progress player-progress--top">
          <span id="currentTime">0:00</span>
          <input class="progress-input" id="progressInput" type="range" min="0" max="100" value="0">
          <span id="durationTime">0:00</span>
        </div>

        <div class="player-controls">
          <button class="player-button player-button--mini" id="repeatButton" type="button" aria-label="Repeat track">Loop</button>
          <button class="player-button player-button--transport" id="prevButton" type="button" aria-label="Previous track">
            <span class="transport transport-prev"></span>
          </button>
          <button class="player-button player-button--play" id="playButton" type="button" aria-label="Play or pause">
            <span class="play-icon"></span>
          </button>
          <button class="player-button player-button--transport" id="nextButton" type="button" aria-label="Next track">
            <span class="transport transport-next"></span>
          </button>
        </div>
      </div>

      <div class="player-right">
        <button class="player-button player-button--lyrics" id="lyricsButton" type="button" aria-label="View lyrics">Lyric</button>
        <button class="queue-toggle queue-toggle--bottom" id="queueToggle" type="button" aria-label="Open queue">
          <span class="queue-icon-custom" aria-hidden="true">
            <span class="queue-icon-play"></span>
            <span class="queue-icon-lines">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </span>
          </span>
        </button>
      </div>
    </footer>
  </div>

  <audio id="audioPlayer" preload="metadata"></audio>
  <script src="menu.js"></script>
</body>
</html>
