<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RondoSpace Lyric</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/lyric.css">
</head>
<body>
  <div class="lyric-shell">
    <main class="lyric-layout">
      <aside class="lyric-sidebar">
        <div class="sidebar-card">
          <div class="song-cover" id="songCover"></div>

          <div class="song-info">
            <h1 id="songTitle">Lội Ngược Dòng</h1>
            <p id="songArtist">Orange</p>
          </div>

          <button class="like-button" type="button" aria-label="Like song">♡</button>

          <div class="player-progress">
            <span id="currentTime">0:00</span>
            <input class="progress-input" id="progressInput" type="range" min="0" max="100" value="0">
            <span id="durationTime">0:00</span>
          </div>

          <div class="player-controls">
            <button class="player-button player-button--mini" id="repeatButton" type="button" aria-label="Repeat track">Loop</button>
            <button class="player-button player-button--transport" id="prevButton" type="button" aria-label="Previous track">
              <span class="transport transport-prev"></span>
            </button>
            <button class="player-button player-button--play" id="playButton" type="button" aria-label="Play or pause">
              <span class="play-icon"></span>
            </button>
            <button class="player-button player-button--transport" id="nextButton" type="button" aria-label="Next track">
              <span class="transport transport-next"></span>
            </button>
            <button class="player-button player-button--queue" type="button" aria-label="Queue">
              <span class="queue-icon-custom" aria-hidden="true">
                <span class="queue-icon-play"></span>
                <span class="queue-icon-lines">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
              </span>
            </button>
          </div>
        </div>
      </aside>

      <section class="lyric-stage">
        <div class="lyric-backdrop" id="lyricBackdrop"></div>
        <div class="lyric-overlay"></div>
        <a class="back-button back-button--stage" href="../html/menu.html" aria-label="Back to menu">×</a>
        <div class="lyric-scroll" id="lyricBody"></div>
      </section>
    </main>
  </div>

  <audio id="audioPlayer" preload="metadata"></audio>
  <script src="../js/lyric.js"></script>
</body>
</html>
