<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rondo♪</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="log-in.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-copy">
        <p class="eyebrow">WELCOME BACK</p>
        <h1>Rondo♪</h1>
        <p class="subtext">Không gian nghe nhạc của riêng bạn</p>
      </div>

      <div class="auth-panel">
        <div class="auth-tabs" role="tablist" aria-label="Authentication tabs">
          <button class="tab-button is-active" id="loginTab" type="button" data-target="loginPanel" aria-selected="true">
            Đăng nhập
          </button>
          <button class="tab-button" id="signupTab" type="button" data-target="signupPanel" aria-selected="false">
            Đăng kí
          </button>
        </div>

        <form class="auth-form is-active" id="loginPanel" novalidate>
          <div class="field">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" name="email" type="email" placeholder="you@example.com" autocomplete="email">
          </div>

          <div class="field">
            <label for="loginPassword">Mật Khẩu</label>
            <input id="loginPassword" name="password" type="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
          </div>

          <button class="submit-button" id="loginButton" type="submit" disabled>Đăng nhập</button>

          <p class="form-note">
            Chưa có tài khoản?
            <button class="inline-switch" type="button" data-switch="signupPanel">Đăng kí ngay</button>
          </p>
        </form>

        <form class="auth-form" id="signupPanel" novalidate hidden>
          <div class="field">
            <label for="signupEmail">Email</label>
            <input id="signupEmail" name="email" type="email" placeholder="you@example.com" autocomplete="email">
          </div>

          <div class="field">
            <label for="signupPassword">Mật khẩu</label>
            <input id="signupPassword" name="password" type="password" placeholder="Tạo mật khẩu" autocomplete="new-password">
          </div>

          <div class="field">
            <label for="signupConfirmPassword">Nhập lại mật khẩu</label>
            <input id="signupConfirmPassword" name="confirmPassword" type="password" placeholder="Nhập lại mật khẩu" autocomplete="new-password">
          </div>

          <p class="field-warning" id="signupWarning" aria-live="polite"></p>

          <button class="submit-button" id="signupButton" type="submit" disabled>Đăng kí</button>

          <p class="form-note">
            Đã có tài khoản?
            <button class="inline-switch" type="button" data-switch="loginPanel">Quay lại đăng nhập</button>
          </p>
        </form>

        <p class="status-message" id="statusMessage" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script src="log-in.js"></script>
</body>
</html>
